{% extends "news_engine/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Confirm Deletion</h4>
                </div>
                <div class="card-body">
                    <p class="lead">Are you sure you want to delete the article:</p>
                    <h3 class="fw-bold text-dark">"{{ article.title }}"?</h3>
                    <p class="text-muted small">This action cannot be undone. All associated comments will also be removed.</p>
                    
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger flex-grow-1">Yes, Delete Permanently</button>
                            <a href="{% url 'article_detail' article.pk %}" class="btn btn-outline-secondary flex-grow-1">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
